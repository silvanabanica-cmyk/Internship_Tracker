<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Internship</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Edit Internship</h1>

        <form action="/update/{{ internship.id }}" method="POST" class="internship-form">
            <input type="text" name="company" value="{{ internship.company }}" required>
            <input type="text" name="role" value="{{ internship.role }}" required>

            <select name="status" required>
                <option value="Saved" {% if internship.status == 'Saved' %}selected{% endif %}>Saved</option>
                <option value="Applied" {% if internship.status == 'Applied' %}selected{% endif %}>Applied</option>
                <option value="Interview" {% if internship.status == 'Interview' %}selected{% endif %}>Interview</option>
                <option value="Rejected" {% if internship.status == 'Rejected' %}selected{% endif %}>Rejected</option>
                <option value="Offer" {% if internship.status == 'Offer' %}selected{% endif %}>Offer</option>
            </select>

            <input type="date" name="deadline" value="{{ internship.deadline }}" required>
            <textarea name="notes" rows="4">{{ internship.notes }}</textarea>

            <button type="submit">Update Internship</button>
        </form>

        <p><a href="/">Back to Home</a></p>
    </div>
</body>
</html>
