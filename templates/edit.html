<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Internship</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <main class="app-shell edit-shell">
        <section class="hero-card">
            <div>
                <p class="eyebrow">Update application</p>
                <h1>Edit Internship</h1>
                <p class="subtitle">
                    Adjust role details, deadline, status, or notes for this application.
                </p>
            </div>

            <a class="ghost-link" href="{{ url_for('home') }}">
                Back to tracker
            </a>
        </section>

        <section class="edit-card">
            <form method="POST" action="{{ url_for('update_internship', id=internship['id']) }}" class="stack-form">
                <label>
                    Company
                    <input
                        type="text"
                        name="company"
                        value="{{ internship['company'] }}"
                        required
                    >
                </label>

                <label>
                    Role
                    <input
                        type="text"
                        name="role"
                        value="{{ internship['role'] }}"
                        required
                    >
                </label>

                <label>
                    Status
                    <select name="status" required>
                        <option value="Saved" {% if internship["status"] == "Saved" %}selected{% endif %}>Saved</option>
                        <option value="Applied" {% if internship["status"] == "Applied" %}selected{% endif %}>Applied</option>
                        <option value="Interview" {% if internship["status"] == "Interview" %}selected{% endif %}>Interview</option>
                        <option value="Rejected" {% if internship["status"] == "Rejected" %}selected{% endif %}>Rejected</option>
                        <option value="Offer" {% if internship["status"] == "Offer" %}selected{% endif %}>Offer</option>
                    </select>
                </label>

                <label>
                    Deadline
                    <input
                        type="date"
                        name="deadline"
                        value="{{ internship['deadline'] }}"
                        required
                    >
                </label>

                <label>
                    Notes
                    <textarea name="notes">{{ internship["notes"] }}</textarea>
                </label>

                <button type="submit">Save changes</button>
            </form>
        </section>
    </main>

</body>
</html>
